name: Daily BBB Report

permissions:
  contents: read
  pages: write
  id-token: write

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      sync_mode:
        description: 'daily | backfill | all'
        required: true
        default: 'backfill'
      report_start_date:
        description: 'YYYY-MM-DD, например 2026-03-01'
        required: false
        default: '2026-03-01'
      report_end_date:
        description: 'YYYY-MM-DD, например 2026-04-30'
        required: false
        default: '2026-04-30'

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright gspread pandas
          playwright install chromium --with-deps

      - name: Resolve sync settings
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "SYNC_MODE=daily" >> "$GITHUB_ENV"
            echo "REPORT_START_DATE=" >> "$GITHUB_ENV"
            echo "REPORT_END_DATE=" >> "$GITHUB_ENV"
          else
            echo "SYNC_MODE=${{ github.event.inputs.sync_mode }}" >> "$GITHUB_ENV"
            echo "REPORT_START_DATE=${{ github.event.inputs.report_start_date }}" >> "$GITHUB_ENV"
            echo "REPORT_END_DATE=${{ github.event.inputs.report_end_date }}" >> "$GITHUB_ENV"
          fi

      - name: Run bot
        run: python "main.py"
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_JSON }}
          BBB_PASSWORD: ${{ secrets.BBB_PASSWORD }}
          GOOGLE_SHEET_IELTS: ${{ secrets.GOOGLE_SHEET_IELTS }}
          GOOGLE_SHEET_RTI: ${{ secrets.GOOGLE_SHEET_RTI }}
          GOOGLE_SHEET_RTN: ${{ secrets.GOOGLE_SHEET_RTN }}
          GOOGLE_SHEET_VIP: ${{ secrets.GOOGLE_SHEET_VIP }}
          GOOGLE_SHEET_NUET: ${{ secrets.GOOGLE_SHEET_NUET }}
          REPORT_TIMEZONE: Asia/Almaty
          SYNC_MODE: ${{ env.SYNC_MODE }}
          REPORT_START_DATE: ${{ env.REPORT_START_DATE }}
          REPORT_END_DATE: ${{ env.REPORT_END_DATE }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug
          path: |
            debug_login.png
            debug_meetings.png
          overwrite: true
