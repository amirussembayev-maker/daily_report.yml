name: Daily BBB Report

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright gspread pandas
          playwright install chromium --with-deps  # ← ключевое исправление

      - name: Run bot
        run: python main.py
        env:
          GOOGLE_JSON: ${{ secrets.GOOGLE_JSON }}
          BBB_PASSWORD: ${{ secrets.BBB_PASSWORD }}

      # Сохраняет скриншот если бот упал — для отладки селекторов
      - name: Upload debug screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: debug_screenshot.png
